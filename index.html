<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Sayang</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  text-align: center;
  overflow: hidden;
}

/* START SCREEN */
#startScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #0f2027;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

button {
  padding: 14px 25px;
  border: none;
  border-radius: 30px;
  background: #00c6ff;
  color: black;
  font-size: 16px;
  cursor: pointer;
}

/* MAIN CONTENT */
#main {
  display: none;
  padding-top: 60px;
}

img {
  width: 220px;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

h1 {
  margin-top: 20px;
  font-size: 30px;
}

p {
  font-size: 17px;
  max-width: 320px;
  margin: auto;
  line-height: 1.6;
}

/* PARTICLE EFFECT */
.dot {
  position: absolute;
  width: 4px;
  height: 4px;
  background: white;
  opacity: 0.7;
  border-radius: 50%;
  animation: float linear infinite;
}

@keyframes float {
  0% { transform: translateY(100vh); opacity: 0; }
  50% { opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<!-- START -->
<div id="startScreen">
  <h2>Hey, ada sesuatu buat sayang </h2>
  <button onclick="start()">Buka</button>
</div>

<!-- MAIN -->
<div id="main">
  <h1>Happy Birthday 🎉</h1>

  <img src="foto.jpg">

  <p>
    Hari ini hari spesial buat kamu.<br><br>
    Semoga semua yang kamu kejar bisa tercapai,<br>
    tetap kuat, sehat, dan jadi versi terbaik dari diri kamu.<br><br>
    Makasih udah jadi bagian penting dalam hidup aku.
  </p>

  <h3>Always with you 🤍</h3>
</div>

<script>
function start() {
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("main").style.display = "block";
}

/* FLOATING PARTICLES */
function createDot() {
  const dot = document.createElement("div");
  dot.classList.add("dot");
  dot.style.left = Math.random() * 100 + "vw";
  dot.style.animationDuration = (Math.random() * 5 + 3) + "s";
  document.body.appendChild(dot);

  setTimeout(() => {
    dot.remove();
  }, 8000);
}

setInterval(createDot, 200);
</script>

</body>
</html>
